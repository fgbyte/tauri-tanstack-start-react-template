# Installs Node.js dependencies with bun, and runs tests

name: Frontend tests
permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    paths-ignore:
      - "src-tauri/**"
      - "README.md"

jobs:
  frontend-tests:
    name: Frontend tests
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v5

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install dependencies from lockfile
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test
